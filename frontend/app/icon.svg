<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background tile -->
  <rect width="32" height="32" rx="7" fill="#0f172a"/>

  <!-- Blue accent dot  top-right -->
  <circle cx="24" cy="8" r="3.5" fill="#3b82f6"/>

  <!-- Stylised "S" built from three staggered pill bars -->
  <!-- Top bar  white, full width -->
  <rect x="7" y="9" width="14" height="3" rx="1.5" fill="#ffffff"/>
  <!-- Mid bar  blue, offset right -->
  <rect x="11" y="14.5" width="14" height="3" rx="1.5" fill="#60a5fa"/>
  <!-- Bottom bar  white, full width -->
  <rect x="7" y="20" width="14" height="3" rx="1.5" fill="#ffffff"/>
</svg>
