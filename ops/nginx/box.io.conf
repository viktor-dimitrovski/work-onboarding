# =============================================================================
# Nginx — solvebox.org Unified Configuration
# =============================================================================
#
# DOMAIN MAP
# ──────────────────────────────────────────────────────────────────────────────
#   solvebox.org              → Static landing page  (/var/www/landing)
#   planner.solvebox.org      → Hive Planner         (React SPA + .NET Kestrel :5000)
#   hub.solvebox.org          → SolveBox Hub admin   (reserved product subdomain)
#   admin.solvebox.org        → SolveBox Hub admin   (reserved product subdomain)
#   <tenant>.solvebox.org     → SolveBox Hub tenant  (Next.js :3001 + FastAPI :8001)
#
# SSL / CERTIFICATE
# ──────────────────────────────────────────────────────────────────────────────
#   Requires a WILDCARD certificate covering: *.solvebox.org  AND  solvebox.org
#
#   Option A (recommended): Cloudflare Origin Certificate
#     Dashboard → SSL/TLS → Origin Server → Create Certificate
#     Hostnames: *.solvebox.org, solvebox.org   Validity: 15 years
#     Install to /etc/ssl/cloudflare/solvebox.org-wildcard.crt
#                /etc/ssl/cloudflare/solvebox.org-wildcard.key
#     Set Cloudflare SSL/TLS mode to "Full (Strict)"
#
#   Option B: Let's Encrypt wildcard (DNS-01)
#     certbot certonly --dns-cloudflare -d solvebox.org -d '*.solvebox.org'
#     Install to /etc/letsencrypt/live/solvebox.org/fullchain.pem
#                /etc/letsencrypt/live/solvebox.org/privkey.pem
#
# SETUP
# ──────────────────────────────────────────────────────────────────────────────
#   sudo cp solvebox.org.conf /etc/nginx/sites-available/solvebox.org.conf
#   sudo ln -sf /etc/nginx/sites-available/solvebox.org.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# SERVICES
# ──────────────────────────────────────────────────────────────────────────────
#   :3001   SolveBox Hub — Next.js frontend    (systemd: solvebox-hub-frontend)
#   :8001   SolveBox Hub — FastAPI backend     (systemd: solvebox-hub-backend)
#   :5000   Hive Planner — .NET Kestrel API   (systemd: hive-planner-api)
#
# NOTE — HIVE PLANNER STATIC ASSETS
# ──────────────────────────────────────────────────────────────────────────────
#   The old app was built with PUBLIC_URL=/hive-planner.  Moving it to
#   planner.solvebox.org root means asset references like /hive-planner/static/…
#   still work thanks to the backward-compat rewrite below.
#   For a clean rebuild: set homepage="/" in package.json, then rm the rewrite.
# =============================================================================


# ─── Shared proxy parameters ─────────────────────────────────────────────────
# Keep in a separate snippet if you have many vhosts:
#   /etc/nginx/snippets/proxy-params.conf  (include snippets/proxy-params.conf)
# ─────────────────────────────────────────────────────────────────────────────


# =============================================================================
# BLOCK 1 — HTTP → HTTPS redirect (apex + all subdomains)
# =============================================================================
server {
    listen 80;
    server_name solvebox.org *.solvebox.org;

    # Do not log redirect noise
    access_log off;

    return 301 https://$host$request_uri;
}


# =============================================================================
# BLOCK 2 — solvebox.org  (apex — static landing page)
# =============================================================================
server {
    listen 443 ssl http2;
    server_name solvebox.org;

    # ── SSL ──────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/ssl/cloudflare/solvebox.org-wildcard.crt;
    ssl_certificate_key /etc/ssl/cloudflare/solvebox.org-wildcard.key;

    # ── Logs ─────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/solvebox-landing-access.log;
    error_log  /var/log/nginx/solvebox-landing-error.log warn;

    # ── Landing page (static HTML) ───────────────────────────────────────────
    root  /var/www/landing;
    index index.html;

    location / {
        # Never cache the root HTML so deploys go live immediately
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        try_files $uri $uri/ /index.html;
    }

    # Static assets — cache aggressively (hash-busted filenames assumed)
    location ~* \.(?:css|js|mjs|map|ico|svg|png|jpg|jpeg|gif|webp|woff2?|ttf|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        access_log off;
        try_files $uri =404;
    }

    # Deny hidden files (.git, .env, etc.)
    location ~ /\. {
        deny all;
    }
}


# =============================================================================
# BLOCK 3 — planner.solvebox.org  (Hive Planner: React SPA + .NET API :5000)
# =============================================================================
server {
    listen 443 ssl http2;
    server_name planner.solvebox.org;

    # ── SSL ──────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/ssl/cloudflare/solvebox.org-wildcard.crt;
    ssl_certificate_key /etc/ssl/cloudflare/solvebox.org-wildcard.key;

    # ── Logs ─────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/solvebox-planner-access.log;
    error_log  /var/log/nginx/solvebox-planner-error.log warn;

    # ── Uploads ──────────────────────────────────────────────────────────────
    client_max_body_size 25m;

    # ── React SPA (static files) ──────────────────────────────────────────────
    root /srv/apps/hive-planner/hive-planner-ui/current;

    # Never cache the SPA entry point
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    # Backward compat: old build references assets under /hive-planner/…
    # Rewrite transparently so cached bookmarks and old links still work.
    # Remove this block once the app is rebuilt with PUBLIC_URL=/.
    location ^~ /hive-planner/ {
        rewrite ^/hive-planner/(.*)$ /$1 last;
    }

    # All SPA routes — serve index.html for unknown paths (client-side routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static assets — long-lived cache (filenames are hash-busted by the build)
    location ~* \.(?:css|js|mjs|map|ico|svg|png|jpg|jpeg|gif|webp|woff2?|ttf|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        access_log off;
        try_files $uri =404;
    }

    # ── API — Swagger/Redoc: BLOCK public access ──────────────────────────────
    # Swagger UI at /api/swagger is internal tooling only.
    # To access during development, use an SSH tunnel:
    #   ssh -L 5000:127.0.0.1:5000 user@solvebox.org
    location ~ ^/api/(swagger|api-docs|redoc) {
        return 404;
    }

    # ── API proxy → .NET Kestrel ──────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # CORS — only allow requests from the same origin
        add_header Access-Control-Allow-Origin      "https://planner.solvebox.org" always;
        add_header Access-Control-Allow-Credentials "true" always;
        add_header Access-Control-Allow-Methods     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers     "Authorization, Content-Type" always;

        # Handle preflight requests at the proxy level
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin      "https://planner.solvebox.org";
            add_header Access-Control-Allow-Credentials "true";
            add_header Access-Control-Allow-Methods     "GET, POST, PUT, PATCH, DELETE, OPTIONS";
            add_header Access-Control-Allow-Headers     "Authorization, Content-Type";
            return 204;
        }
    }

    # Deny hidden files
    location ~ /\. {
        deny all;
    }
}


# =============================================================================
# BLOCK 4 — *.solvebox.org  (SolveBox Hub: Next.js :3001 + FastAPI :8001)
#
# Subdomain routing is handled by the application itself, not by Nginx.
# The Host header (and X-Forwarded-Host) is forwarded as-is so the backend
# can extract the tenant slug or detect a reserved product subdomain.
#
# Backend env must include:
#   BASE_DOMAINS=solvebox.org
#   RESERVED_SUBDOMAINS=admin,billing,docs,status,api,hub
#   TRUST_PROXY_HEADERS=true
# =============================================================================
server {
    listen 443 ssl http2;
    server_name *.solvebox.org;

    # ── SSL ──────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/ssl/cloudflare/solvebox.org-wildcard.crt;
    ssl_certificate_key /etc/ssl/cloudflare/solvebox.org-wildcard.key;

    # ── Logs ─────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/solvebox-hub-access.log;
    error_log  /var/log/nginx/solvebox-hub-error.log warn;

    # ── Limits ───────────────────────────────────────────────────────────────
    client_max_body_size 25m;

    # ── FastAPI Swagger / Redoc: BLOCK public access ──────────────────────────
    # Docs endpoints are for local development only.
    # Access via SSH tunnel: ssh -L 8001:127.0.0.1:8001 user@solvebox.org
    location ~ ^/api/v1/(docs|redoc|openapi\.json) {
        return 404;
    }

    # ── Backend API → FastAPI ─────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8001;
        proxy_http_version 1.1;

        # Forward original host so the app can resolve the tenant from subdomain
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # ── Frontend → Next.js ────────────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;

        # WebSocket support (Next.js HMR in dev; keep for production readiness)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Forward original host so Next.js middleware can read the subdomain
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Host  $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Deny hidden files
    location ~ /\. {
        deny all;
    }
}
